name: Zodex E2E

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUN_ZODEX_E2E: "1"
  CODEX_PROXY_ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}

jobs:
  zodex-e2e:
    name: Zodex CLI through proxy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Install pytest
        run: python -m pip install pytest

      - name: Build proxy
        run: cargo build

      - name: Run zodex integration tests
        run: python -m pytest --confcutdir=tests/integration tests/integration/test_zodex_cli.py -q
